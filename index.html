<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Axel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{
min-height:100vh;background:linear-gradient(135deg,#111,#3b0a45);
color:white;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;
}
.card{
max-width:520px;background:rgba(255,255,255,.12);padding:35px 25px;
border-radius:25px;box-shadow:0 20px 50px rgba(0,0,0,.4);
}
h1{font-size:36px;margin-bottom:18px}
p{font-size:19px;line-height:1.6;margin-bottom:24px}
button{
border:0;border-radius:999px;padding:14px 25px;background:white;
color:#c2185b;font-weight:bold;font-size:17px;cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<h1 id="title">Hola Axel 👀</h1>
<p id="text">Tengo algo importante que decirte...</p>
<button onclick="next()">Descubrir</button>
</div>

<script>
let step = 0;

const mensajes = [
  ["Primero que todo...", "Espero que estés teniendo un buen día. 😌"],
  ["Ahora sí...", "He estado analizando todo cuidadosamente..."],
  ["Después de revisar las pruebas...", "Llegué a una conclusión seria."],
  ["La verdad es...", "No te creo absolutamente nada. 😂"],
  ["JAJAJA", "Era una prueba, Axel. Solo quería ver si la página funcionaba."]
];

function next(){
  if(step < mensajes.length){
    document.getElementById("title").textContent = mensajes[step][0];
    document.getElementById("text").textContent = mensajes[step][1];
    step++;
  }else{
    document.querySelector(".card").innerHTML = `
      <h1>Fin de la prueba 😂</h1>
      <p>Si llegaste hasta aquí, la página sí funcionó.</p>
    `;
  }
}
</script>

</body>
</html>
